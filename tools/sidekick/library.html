<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="Description" content="Sidekick Library" />
    <meta name="robots" content="noindex" />
    <base href="/" />

    <style>
      :root {
        --sk-block-table-background-color: #fbe4d5;
        --sk-block-table-foreground-color: #000;
        --sk-section-metadata-table-background-color: #d9e2f3;
        --sk-section-metadata-table-foreground-color: #000;
        --sk-metadata-table-background-color: #d9e2f3;
        --sk-metadata-table-foreground-color: #000;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
        background-color: #ededed;
        height: 100%;
      }
      
      helix-sidekick { display: none }
    </style>
    <title>Sidekick Library</title>
  </head>

  <body>
    <script
      type="module"
      src="https://www.hlx.live/tools/sidekick/library/index.js"
    ></script>
    <script>
      const library = document.createElement('sidekick-library');
      const currentUrl = window.location.href;
      const mainUrl = '--vg-macktrucks-com--hlxsites.hlx';

      library.config = {
        base: '/block-library/library.json',
        plugins: {
          blocks: {
            viewPorts: [
              {
                width: '375px',
                label: 'Phone',
                icon: 'device-phone',
              },
              {
                width: '744px',
                label: 'Tablet',
                icon: 'device-tablet',
              },
              {
                width: '1200px',
                label: 'Desktop 1200',
                icon: 'device-desktop',
              },
              {
                width: '1440px',
                label: 'Desktop 1440',
                icon: 'device-desktop',
                default: true,
              },
            ],
          }
        }
      }

      if (!currentUrl.includes(mainUrl) && !currentUrl.includes('localhost')) {
        library.config.extends = 'https://main--vg-macktrucks-com--hlxsites.hlx.page/block-library/library.json';
      }

      document.body.prepend(library)
    </script>
  </body>
</html>
